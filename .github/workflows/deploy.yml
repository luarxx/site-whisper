name: Deploy main.py para VPS

on:
  push:
    branches: [main, master]
    paths:
      - "main.py"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copiar main.py via SCP
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "$SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key main.py ${VPS_USER}@${VPS_HOST}:~/whisper-api/main.py

      - name: Reiniciar servico Whisper
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "$SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key ${VPS_USER}@${VPS_HOST} "sudo systemctl restart whisper && sudo systemctl status whisper --no-pager"
          rm -f ~/.ssh/vps_key
