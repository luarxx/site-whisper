name: Deploy main.py para VPS

on:
  push:
    branches: [main, master]
    paths:
      - "main.py"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar main.py e reiniciar servico
        env:
          SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H ${VPS_HOST} >> ~/.ssh/known_hosts 2>/dev/null
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key main.py ${VPS_USER}@${VPS_HOST}:~/whisper-api/main.py
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key ${VPS_USER}@${VPS_HOST} "sudo systemctl restart whisper && sudo systemctl status whisper --no-pager"
          rm -f ~/.ssh/vps_key
