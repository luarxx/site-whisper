name: Deploy main.py para VPS

on:
  push:
    branches: [main, master]
    paths:
      - "main.py"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar main.py para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "main.py"
          target: "~/whisper-api/"
          strip_components: 0
          overwrite: true

      - name: Reiniciar serviço Whisper
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl restart whisper
            sudo systemctl status whisper --no-pager
