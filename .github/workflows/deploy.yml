name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist"
          target: "~/whisper-api/static/"
          strip_components: 1
          rm: true

      - name: Deploy main.py
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "main.py"
          target: "~/whisper-api/"

      - name: Deploy requirements.txt
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "requirements.txt"
          target: "~/whisper-api/"

      - name: Install Python dependencies
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ -f ~/whisper-api/venv/bin/pip ]; then
              ~/whisper-api/venv/bin/pip install -r ~/whisper-api/requirements.txt
            fi

      - name: Restart service (PM2)
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            pm2 restart whisper-api
            pm2 show whisper-api

      - name: Verify deployment (health check)
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 3
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8000/health; then
                echo "✅ Deploy verificado com sucesso."
                exit 0
              fi
              echo "⏳ Aguardando serviço iniciar... tentativa $i/5"
              sleep 3
            done
            echo "❌ Serviço não respondeu após 5 tentativas."
            exit 1
